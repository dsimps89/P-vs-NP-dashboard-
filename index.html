<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>P vs NP Studio</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    margin:0;
    background:#0f172a;
    color:white;
}

header{
    padding:20px;
    background:#020617;
}

.container{
    display:grid;
    grid-template-columns:350px 1fr;
    height:calc(100vh - 80px);
}

.sidebar{
    border-right:1px solid #334155;
    overflow:auto;
    padding:15px;
}

.content{
    overflow:auto;
    padding:20px;
}

input,select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    border:none;
}

.card{
    background:#1e293b;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
    cursor:pointer;
}

.card:hover{
    background:#334155;
}

.title{
    font-weight:bold;
}

.badge{
    display:inline-block;
    padding:4px 8px;
    background:#2563eb;
    border-radius:999px;
    margin-right:5px;
    font-size:12px;
}

.stats{
    margin-bottom:20px;
}

h2{
    margin-top:0;
}

pre{
    white-space:pre-wrap;
    word-wrap:break-word;
}

</style>
</head>

<body>

<header>
    <h1>P vs NP Studio</h1>
</header>

<div class="container">

    <div class="sidebar">

        <div class="stats" id="stats"></div>

        <input
            id="search"
            placeholder="Search problems..."
        >

        <select id="category">
            <option value="all">All Categories</option>
            <option value="database_problems">Database Problems</option>
            <option value="flow_problems">Flow Problems</option>
            <option value="graph_theory">Graph Theory</option>
            <option value="network_design">Network Design</option>
        </select>

        <div id="results"></div>

    </div>

    <div class="content">

        <div id="detail">

            <h2>Select a Problem</h2>

            <p>
                Choose a problem from the list.
            </p>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
