<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>P vs NP Studio</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
}

#search{
    width:100%;
    padding:10px;
    font-size:16px;
}

.problem{
    border:1px solid #ccc;
    padding:10px;
    margin:6px 0;
}

.title{
    font-weight:bold;
}
</style>
</head>

<body>

<h1>P vs NP Studio</h1>

<div id="stats"></div>

<input id="search" placeholder="Search problems...">

<div id="results"></div>

<script>

let catalog = null;

fetch("catalog.json")
.then(r => r.json())
.then(data => {

    catalog = data;

    document.getElementById("stats").innerHTML =
        `
        <p>
        Total Problems: ${data.totalProblems}
        </p>
        `;

    render(data.problems);
});

function render(problems){

    let html = "";

    for(const p of problems){

        html += `
        <div class="problem">
            <div class="title">${p.title}</div>
            <div>${p.category}</div>
        </div>
        `;
    }

    document.getElementById("results").innerHTML = html;
}

document.getElementById("search")
.addEventListener("input", e => {

    if(!catalog) return;

    const q = e.target.value.toLowerCase();

    const filtered = catalog.problems.filter(p =>
        p.title.toLowerCase().includes(q) ||
        p.name.toLowerCase().includes(q)
    );

    render(filtered);
});

</script>

</body>
</html>
